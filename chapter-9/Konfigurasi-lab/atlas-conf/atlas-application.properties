#
# Apache Atlas — selaras pipeline Medallion (Bronze/Silver/Gold) + siklus katalog
# Backend: JanusGraph di HBase (graph) + Solr HTTP (pencarian / discovery)
#

# ─── Server ─────────────────────────────────────────────────────────────────
atlas.server.http.port=21000
atlas.server.bind.address=0.0.0.0
atlas.rest.address=http://atlas:21000
# Wajib false di stack dev Docker — bila true, Atlas memakai SecureEmbeddedServer dan
# membutuhkan cert.stores.credential.provider.path + keystore (error startup tanpa itu).
atlas.enableTLS=false

# ─── Auth ───────────────────────────────────────────────────────────────────
atlas.authentication.method.file=true
atlas.authentication.method.ldap.type=none

# ─── Graph (HBase / JanusGraph) ───────────────────────────────────────────
atlas.graph.storage.backend=hbase2
atlas.graph.storage.hbase.table=apache_atlas_janus
# Quorum = hostname saja (bukan host:port). Port lewat property.clientPort — bila salah,
# klien HBase sering fallback ke localhost:2181 → Connection refused di dalam container Atlas.
atlas.graph.storage.hbase.zookeeper.quorum=hbase
atlas.graph.storage.hbase.zookeeper.property.clientPort=2181
atlas.graph.storage.hbase.zookeeper.znode.parent=/hbase
atlas.graph.storage.hbase.compress.nativ=false

# ─── Search index (Solr, mode HTTP — service `solr` di docker-compose) ──────
atlas.graph.index.search.backend=solr
atlas.graph.index.search.solr.mode=http
atlas.graph.index.search.solr.embedded=false
# Basis URL Solr (tanpa nama core); JanusGraph/Atlas menambahkan core vertex/edge/fulltext lewat metadata indeks.
atlas.graph.index.search.solr.http-urls=http://solr:8983/solr
atlas.graph.index.search.solr.zookeeper-url=
atlas.graph.index.search.solr.wait-searcher=false
atlas.graph.index.search.max-result-set-size=150
# Core Solr (vertex_index, edge_index, fulltext_index) dibuat otomatis oleh service solr-atlas-init

# ─── Kafka (notifikasi / hook — cluster di compose) ─────────────────────────
atlas.notification.embedded=false
atlas.kafka.zookeeper.connect=zookeeper:2181
atlas.kafka.bootstrap.servers=kafka:9092
atlas.kafka.zookeeper.session.timeout.ms=60000
atlas.kafka.zookeeper.connection.timeout.ms=30000
atlas.kafka.zookeeper.sync.time.ms=20
atlas.kafka.auto.commit.interval.ms=1000
atlas.kafka.hook.group.id=atlas-hook
atlas.kafka.entities.group.id=atlas-entities
atlas.notification.create.topics=true
atlas.notification.topics.hook=ATLAS_HOOK
atlas.notification.topics.entities=ATLAS_ENTITIES

# ─── Audit (tanpa tabel audit HBase terpisah — mengurangi kegagalan startup) ─
atlas.entity.audit.repository.impl=org.apache.atlas.repository.audit.NoopEntityAuditRepository
atlas.audit.hbase.zookeeper.quorum=hbase
atlas.audit.hbase.zookeeper.property.clientPort=2181
atlas.audit.hbase.tablename=apache_atlas_entity_audit
atlas.EnableAudit=false

# ─── Hive hook (opsional; Hive Metastore terpisah di stack ini) ─────────────
atlas.hook.hive.synchronous=false
atlas.hook.hive.numRetries=3
atlas.hook.hive.queueSize=10000

# ─── UI / pencarian teks ────────────────────────────────────────────────────
atlas.ui.default.version=v1
atlas.search.fulltext.enable=true
