services:
  minio:
    image: minio/minio:latest
    container_name: bigdata-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: admin123
    command: server /data --console-address ":9001"
    volumes:
      - ./data:/data
    networks:
      - bigdata-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 10s

  mc:
    image: minio/mc:latest
    container_name: bigdata-mc
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: ["tail", "-f", "/dev/null"]
    networks:
      - bigdata-net

  compute:
    image: python:3.11-slim
    container_name: bigdata-compute
    depends_on:
      minio:
        condition: service_healthy
    volumes:
      - ./app:/app
      - ./raw-data:/raw-data
    working_dir: /app
    environment:
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: admin
      MINIO_SECRET_KEY: admin123
    command: >
      bash -c "pip install --no-cache-dir boto3 pandas pyarrow -q
      && tail -f /dev/null"
    networks:
      - bigdata-net

networks:
  bigdata-net:
    name: bigdata-chapter3-net
    driver: bridge
