# Sesuai Bab 12 — Superset + PostgreSQL (viz-*)
services:
  postgres:
    image: postgres:15
    container_name: viz-postgres
    environment:
      POSTGRES_USER: superset
      POSTGRES_PASSWORD: superset
      POSTGRES_DB: analytics
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U superset -d analytics"]
      interval: 10s
      timeout: 5s
      retries: 5

  superset:
    image: apache/superset:3.1.0
    container_name: viz-superset
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SUPERSET_SECRET_KEY: "kunci-rahasia-ganti-di-produksi"
      DATABASE_URL: postgresql+psycopg2://superset:superset@postgres:5432/analytics
    ports:
      - "8088:8088"
    command: >
      bash -c "
        pip install psycopg2-binary --quiet &&
        superset db upgrade &&
        superset fab create-admin
          --username admin
          --firstname Admin
          --lastname User
          --email admin@lab.local
          --password admin &&
        superset init &&
        superset run -h 0.0.0.0 -p 8088 --with-threads --reload
      "

volumes:
  pgdata:
